<html lang="ko">

  <title>재무분석 대시보드</title>
  <style>
    :root{--bg:#f6f8fb;--surface:#fff;--soft:#f8fafc;--ink:#111827;--muted:#64748b;--line:#e5e7eb;--primary:#4f46e5;--primary-soft:#eef2ff;--green:#16a34a;--red:#dc2626;--amber:#d97706;--shadow:0 12px 28px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif} button,input,select{font:inherit}.hidden{display:none!important}
    .upload{min-height:100vh;display:grid;place-items:center;padding:24px}.upload-box,.card,.panel,.side,.modal{background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.upload-box{width:min(680px,100%);padding:32px;display:grid;gap:16px}.eyebrow{color:var(--primary);font-size:12px;font-weight:800;text-transform:uppercase}.upload h1,.top h1{margin:0;font-size:clamp(28px,4vw,42px);line-height:1.08}.muted{color:var(--muted);line-height:1.55}.drop{min-height:210px;border:2px dashed #c7d2fe;background:#fbfdff;display:grid;place-items:center;text-align:center;gap:8px;padding:28px;cursor:pointer}.drop.drag{background:var(--primary-soft);border-color:var(--primary)}.badge{width:72px;height:72px;display:grid;place-items:center;background:var(--primary-soft);border:1px solid #c7d2fe;color:var(--primary);font-weight:900}.err{color:var(--red);min-height:24px}.top{background:#fff;border-bottom:1px solid var(--line);padding:22px 28px 16px;display:flex;justify-content:space-between;gap:16px;align-items:center}.tabs{display:flex;gap:6px;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--line);padding:12px 28px}.tab,.btn,.seg,.icon{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:6px;padding:9px 12px;cursor:pointer}.tab.active,.btn.primary,.seg.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:800}.icon{font-size:12px;padding:6px 8px}.main{padding:22px 28px 34px;display:grid;gap:16px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}.kpi{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px}.kpi b{display:block;color:var(--muted);font-size:12px;text-transform:uppercase}.kpi strong{display:block;font-size:clamp(22px,2.5vw,32px);margin:8px 0;overflow-wrap:anywhere}.delta.pos{color:var(--green)}.delta.neg{color:var(--red)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{padding:16px;min-width:0}.panel h3{margin:0 0 12px}.chart{height:330px;width:100%;min-height:180px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:10px 12px;border-bottom:1px solid #edf2f7;white-space:nowrap;text-align:right}th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}th{background:var(--soft);color:var(--muted);font-size:12px}.builder{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;align-items:start}.side{padding:14px;display:grid;gap:12px;position:sticky;top:12px}.side h3,.side h4{margin:0}.builder-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-flow:dense;gap:14px}.card{padding:14px;min-width:0;display:flex;flex-direction:column;overflow:hidden}.card header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.card h3{margin:4px 0 0;font-size:18px}.small{font-size:12px;color:var(--muted);font-weight:800}.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.check-list{display:flex;gap:8px;flex-wrap:wrap}.check-list label{font-size:12px;display:inline-flex;align-items:center;gap:5px;background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:7px 9px}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:20;display:none;place-items:center;padding:20px}.modal-bg.open{display:grid}.modal{width:min(720px,100%);max-height:90vh;overflow:auto;padding:20px;display:grid;gap:14px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{display:grid;gap:6px;color:var(--muted);font-size:13px}.form label:last-child{grid-column:1/-1}.input{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;background:#fff}select[multiple]{min-height:150px}.segs{display:flex;gap:6px;flex-wrap:wrap}.modal-actions{display:flex;justify-content:flex-end;gap:8px}@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2,.builder{grid-template-columns:1fr}.side{position:static}}@media(max-width:720px){.top{flex-direction:column;align-items:flex-start}.main,.tabs,.top{padding-left:16px;padding-right:16px}.kpis,.grid2,.form,.builder-grid{grid-template-columns:1fr}.card{grid-column:1/-1!important}}

<body>
<div id="app"></div>
<script type="module">
import * as XLSX from 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm';
import * as echarts from 'https://cdn.jsdelivr.net/npm/echarts@6.0.0/+esm';

const app=document.getElementById('app');
const state={book:null,tab:'overview',charts:[],layout:null};
const moneyCodes=new Set(['REV','COGS','GP','SGA','OP','NI','TA','TL','EQ','CA','CL','NCA','NCL','OCF','ICF','CFF','CAPEX','DEBT','EBITDA','FCF']);
const widthPresets=[2,3,4,6,8,12], heightPresets={Compact:160,Standard:280,Tall:380,Deep:520};
const tabs=[['overview','Overview'],['pnl','P&L'],['balance','Balance'],['cash','Cash Flow'],['metrics','Metrics'],['builder','Builder']];

function el(tag, text='', cls=''){const x=document.createElement(tag); if(text!==null)x.textContent=text; if(cls)x.className=cls; return x}
function btn(text, cls='btn'){const b=el('button',text,cls); b.type='button'; return b}
function clearCharts(){state.charts.forEach(c=>c.dispose()); state.charts=[]}
function num(v){if(v==null||v==='')return null;if(typeof v==='number')return Number.isFinite(v)?v:null;let s=String(v).trim(),neg=/^\(.*\)$/.test(s);s=s.replace(/[(),\s원]/g,'').replace(/%$/,'').replace(/x$/i,'');let n=Number(s);if(!Number.isFinite(n))return null;return String(v).trim().endsWith('%')?(neg?-n:n)/100:(neg?-n:n)}
function won(v){let n=num(v);if(n==null)return '-';let a=Math.abs(n),d=1;if(a>=1e12)return `${trim(n/1e12,d)}조원`;if(a>=1e8)return `${trim(n/1e8,d)}억원`;if(a>=1e6)return `${trim(n/1e6,0)}백만원`;return `${Math.round(n).toLocaleString('ko-KR')}원`}
function pct(v){let n=num(v);return n==null?'-':`${(n*100).toFixed(1)}%`}
function mul(v){let n=num(v);return n==null?'-':`${trim(n,1)}x`}
function trim(n,d){return n.toFixed(d).replace(/\.0+$|(\.\d*[1-9])0+$/,'$1')}
function div(a,b){return typeof a==='number'&&typeof b==='number'&&b!==0?a/b:null}
function sub(a,b){return typeof a==='number'&&typeof b==='number'?a-b:null}
function avg(a,b){return typeof a==='number'&&typeof b==='number'?(a+b)/2:null}
function fmtMetric(name,v){if(/EBITDA|FCF/.test(name)&&!/마진/.test(name))return won(v); if(/배율|회전율|OCF\/영업이익/.test(name))return mul(v); if(/률|비율|마진|ROA|ROE|OCF\/매출|CAPEX\/매출/.test(name))return pct(v); return Math.abs(num(v)??0)<=5&&v!==0?pct(v):won(v)}

function collectPeriods(header){return header.map((v,i)=>period(v,i)).filter(Boolean).sort((a,b)=>a.sort-b.sort)}
function period(v,i){let s=String(v??'').trim(); if(!s)return null; if(/^20\d{2}$/.test(s)){let y=+s;return{key:s,label:s,type:'year',year:y,col:i,sort:y*10000}} let q=s.match(/^(20\d{2})[-.\s]?Q([1-4])$/i)||s.match(/^(20\d{2})[-.\s]?([1-4])Q$/i); if(q){let y=+q[1],qq=+q[2];return{key:`${y}-Q${qq}`,label:`${y} Q${qq}`,type:'quarter',year:y,quarter:qq,col:i,sort:y*10000+qq*100}} let m=s.match(/^(20\d{2})[-.]?(0[1-9]|1[0-2])$/); if(m){let y=+m[1],mo=+m[2],k=`${y}-${String(mo).padStart(2,'0')}`;return{key:k,label:k,type:'month',year:y,month:mo,col:i,sort:y*10000+mo*100}} return null}
function parseBook(file,buf){const wb=XLSX.read(buf,{type:'array'}), raw=wb.Sheets.Raw_FS; if(!raw)throw Error('Raw_FS 시트가 없습니다.'); const rows=XLSX.utils.sheet_to_json(raw,{header:1,defval:null,raw:true}), head=rows[3]||[], periods=collectPeriods(head); if(!periods.length)throw Error('기간 컬럼을 찾지 못했습니다.'); const data=rows.slice(4).map(r=>{let code=String(r[1]??'').trim(),name=String(r[2]??'').trim(); if(!code||!name)return null; return{section:String(r[0]??''),code,name,label:`${name} (${code})`,values:periods.map(p=>num(r[p.col]))}}).filter(Boolean); const setup=wb.Sheets.Setup?XLSX.utils.sheet_to_json(wb.Sheets.Setup,{header:1,defval:null}):[]; const company=(setup.find(r=>String(r[0]??'').trim()==='회사명'&&r[1])||setup.find(r=>String(r[0]??'').includes('회사')&&r[1]))?.[1]||'Unknown'; const metrics=wb.Sheets.Metrics?parseMetrics(wb.Sheets.Metrics):[]; const book={file:file.name,company:String(company),periods,rows:data,metrics,map:new Map(data.map(r=>[r.code,r]))}; book.ratios=calc(book); book.fingerprint=Math.abs(hash([book.company,periods.map(p=>p.key).join('|'),data.map(r=>r.code).join('|')].join('::'))).toString(36); return book}
function parseMetrics(ws){const t=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true}), ps=collectPeriods(t[3]||[]); return t.slice(4).filter(r=>r[0]||r[1]).map(r=>({section:String(r[0]??''),name:String(r[1]??''),values:ps.map(p=>num(r[p.col]))}))}
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h<<5)-h+s.charCodeAt(i)|0;return h}
function calc(b){const val=(c,i)=>b.map.get(c)?.values?.[i]??null, met=n=>b.metrics.find(m=>m.name===n)?.values??null, mv=(arr,i)=>typeof arr?.[i]==='number'?arr[i]:null; return b.periods.map((_,i)=>{let rev=val('REV',i),op=val('OP',i),ni=val('NI',i),ta=val('TA',i),tl=val('TL',i),eq=val('EQ',i),ca=val('CA',i),cl=val('CL',i),ocf=val('OCF',i),capex=val('CAPEX',i),debt=val('DEBT',i),int=Math.abs(val('INT',i)??0),gp=val('GP',i),sga=val('SGA',i),ebitda=mv(met('EBITDA'),i)??[op,val('DA',i),val('AMORT',i),val('ROUDEP',i)].filter(x=>typeof x==='number').reduce((a,b)=>a+b,0);return{revGrowth:div(sub(rev,val('REV',i-1)),Math.abs(val('REV',i-1)??0)),grossMargin:mv(met('매출총이익률'),i)??div(gp,rev),sgaRatio:div(sga,rev),opMargin:mv(met('영업이익률'),i)??div(op,rev),netMargin:mv(met('순이익률'),i)??div(ni,rev),ebitda,ebitdaMargin:mv(met('EBITDA 마진'),i)??div(ebitda,rev),roa:mv(met('ROA'),i)??div(ni,avg(val('TA',i-1),ta)),roe:mv(met('ROE'),i)??div(ni,avg(val('EQ',i-1),eq)),debtRatio:mv(met('부채비율'),i)??div(tl,eq),currentRatio:mv(met('유동비율'),i)??div(ca,cl),debtDependency:mv(met('차입금의존도'),i)??div(debt,ta),interestCoverage:mv(met('이자보상배율'),i)??div(op,int),ocfToRev:mv(met('OCF/매출'),i)??div(ocf,rev),ocfToOp:mv(met('OCF/영업이익'),i)??div(ocf,op),fcf:mv(met('FCF'),i)??sub(ocf,capex),capexToRev:mv(met('CAPEX/매출'),i)??div(capex,rev)}})}

function upload(){app.innerHTML=''; const box=el('main',null,'upload'), sec=el('section',null,'upload-box'), input=el('input'); input.type='file'; input.accept='.xlsx,.xls'; input.className='hidden'; const drop=el('div',null,'drop'), err=el('p','', 'err'); drop.innerHTML='<div class="badge">XLSX</div><strong>파일을 드래그하거나 클릭하여 업로드</strong><span class="muted">Raw_FS 시트가 포함된 재무분석 파일을 사용합니다.</span>'; const choose=btn('파일 선택','btn primary'); sec.append(el('div','Offline Financial Analysis','eyebrow'),el('h1','재무분석 대시보드'),el('p','xlsx 파일을 브라우저 안에서 읽고, 분석 탭과 카드 빌더를 생성합니다.','muted'),drop,choose,input,err); box.append(sec); app.append(box); const open=()=>input.click(); drop.onclick=open; choose.onclick=open; input.onchange=()=>loadFile(input.files[0],err); drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag')}; drop.ondragleave=()=>drop.classList.remove('drag'); drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag');loadFile(e.dataTransfer.files[0],err)}}
async function loadFile(file,err){if(!file)return; if(!/\.xlsx?$/i.test(file.name)){err.textContent='xlsx 또는 xls 파일만 업로드할 수 있습니다.';return} try{state.book=parseBook(file,await file.arrayBuffer()); state.tab='overview'; state.layout=loadLayout(); render()}catch(e){err.textContent='파일을 읽지 못했습니다. '+(e.message||e)}}
function render(){if(!state.book)return upload(); clearCharts(); app.innerHTML=''; const b=state.book, shell=el('div'), top=el('header',null,'top'), meta=el('div'); meta.append(el('div','Financial Dashboard','eyebrow'),el('h1',b.company),el('p',`${b.file} · ${b.periods.length}개 기간 · ${b.rows.length}개 계정`,'muted')); const reset=btn('파일 변경'); reset.onclick=()=>{state.book=null;state.layout=null;upload()}; top.append(meta,reset); const nav=el('nav',null,'tabs'); tabs.forEach(([id,label])=>{const t=btn(label,state.tab===id?'tab active':'tab'); t.onclick=()=>{state.tab=id; render()}; nav.append(t)}); const main=el('main',null,'main'); shell.append(top,nav,main); app.append(shell); renderTab(main)}
function periods(){return state.book.periods.filter(p=>p.type==='year').length?state.book.periods.filter(p=>p.type==='year'):state.book.periods}
function idxs(ps=periods()){return ps.map(p=>state.book.periods.findIndex(x=>x.key===p.key))}
function latest(){return idxs().at(-1)}
function row(c){return state.book.map.get(c)}
function vals(c,ps=periods()){let r=row(c);return idxs(ps).map(i=>r?.values?.[i]??null)}
function kpi(label,value,sub,kind='won'){const x=el('div',null,'kpi'); x.innerHTML=`<b>${label}</b><strong>${kind==='pct'?pct(value):kind==='mul'?mul(value):won(value)}</strong><span class="muted">${sub||''}</span>`; return x}
function table(rows,ps=periods(),mode='money'){const w=el('div',null,'table-wrap'), t=el('table'), thead=el('thead'), tr=el('tr'); ['구분','항목',...ps.map(p=>p.label)].forEach(h=>tr.append(el('th',h))); thead.append(tr); const tb=el('tbody'); rows.forEach(r=>{const tr=el('tr'); tr.append(el('td',r.section||''),el('td',r.name||r.label||'')); idxs(ps).forEach(i=>{const v=r.values?.[i]; tr.append(el('td',mode==='auto'?fmtMetric(r.name||'',v):mode==='pct'?pct(v):won(v)))}); tb.append(tr)}); t.append(thead,tb); w.append(t); return w}
function panel(title){const p=el('section',null,'panel'), h=el('h3',title), c=el('div',null,'chart'); p.append(h,c); return[p,c]}
function chart(dom,opt){const c=echarts.init(dom); c.setOption(opt); new ResizeObserver(()=>c.resize()).observe(dom); state.charts.push(c)}
function axisMoney(v){return Math.abs(v)>=1e8?`${trim(v/1e8,0)}억`:v}
function line(dom,series,ps=periods()){chart(dom,{color:['#4f46e5','#0f9f9a','#16a34a','#d97706','#dc2626'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{left:78,right:20,top:24,bottom:52},xAxis:{type:'category',data:ps.map(p=>p.label)},yAxis:{type:'value',axisLabel:{formatter:axisMoney}},series:series.map(s=>({...s,type:'line',smooth:true}))})}
function bar(dom,series,ps=periods()){chart(dom,{color:['#4f46e5','#0f9f9a','#16a34a','#d97706'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{left:78,right:20,top:24,bottom:52},xAxis:{type:'category',data:ps.map(p=>p.label)},yAxis:{type:'value',axisLabel:{formatter:axisMoney}},series:series.map(s=>({...s,type:'bar'}))})}
function renderTab(main){const b=state.book, l=latest(), r=b.ratios[l]||{}; if(state.tab==='overview'){main.append(el('div','데이터 품질 점검 통과','muted'),kpi('매출액',row('REV')?.values[l],b.periods[l]?.label),kpi('영업이익률',r.opMargin,'본업 수익성','pct'),kpi('EBITDA 마진',r.ebitdaMargin,'현금창출형 수익성','pct'),kpi('OCF/매출',r.ocfToRev,'현금 전환력','pct'),kpi('부채비율',r.debtRatio,'재무 레버리지','pct')); main.lastChild.className='kpis'; const [p1,c1]=panel('매출 · 영업이익 · 순이익 추이'),[p2,c2]=panel('주요 지표 YoY 히트맵'); const g=el('div',null,'grid2'); g.append(p1,p2); main.append(g); line(c1,[{name:'매출액',data:vals('REV')},{name:'영업이익',data:vals('OP')},{name:'순이익',data:vals('NI')}]); line(c2,[{name:'매출성장률',data:idxs().map(i=>b.ratios[i]?.revGrowth)},{name:'영업이익률',data:idxs().map(i=>b.ratios[i]?.opMargin)},{name:'ROE',data:idxs().map(i=>b.ratios[i]?.roe)}])}
else if(state.tab==='pnl'){main.append(kpi('매출액',row('REV')?.values[l],b.periods[l]?.label),kpi('매출총이익률',r.grossMargin,'원가 구조','pct'),kpi('판관비율',r.sgaRatio,'비용 효율','pct'),kpi('영업이익률',r.opMargin,'본업 수익성','pct'),kpi('순이익률',r.netMargin,'최종 이익 체력','pct')); main.lastChild.className='kpis'; const [p,c]=panel('손익 추이'); main.append(p,table(b.rows.filter(x=>['REV','COGS','GP','SGA','OP','NI'].includes(x.code)))); bar(c,[{name:'매출액',data:vals('REV')},{name:'매출원가',data:vals('COGS')},{name:'판관비',data:vals('SGA')},{name:'영업이익',data:vals('OP')}])}
else if(state.tab==='balance'){main.append(kpi('자산총계',row('TA')?.values[l],b.periods[l]?.label),kpi('자본총계',row('EQ')?.values[l],'자기자본'),kpi('부채비율',r.debtRatio,'레버리지','pct'),kpi('유동비율',r.currentRatio,'단기 안정성','mul'),kpi('차입금의존도',r.debtDependency,'차입 부담','pct')); main.lastChild.className='kpis'; const [p,c]=panel('자산 · 부채 · 자본 구성'); main.append(p,table(b.rows.filter(x=>['CA','NCA','TA','CL','NCL','TL','EQ','DEBT'].includes(x.code)))); bar(c,[{name:'자산총계',data:vals('TA')},{name:'부채총계',data:vals('TL')},{name:'자본총계',data:vals('EQ')}])}
else if(state.tab==='cash'){main.append(kpi('영업현금흐름',row('OCF')?.values[l],b.periods[l]?.label),kpi('FCF',r.fcf,'OCF - CAPEX'),kpi('CAPEX',row('CAPEX')?.values[l],'투자 강도'),kpi('OCF/매출',r.ocfToRev,'현금화 수준','pct'),kpi('CAPEX/매출',r.capexToRev,'투자 부담','pct')); main.lastChild.className='kpis'; const [p,c]=panel('OCF · ICF · CFF 추이'); main.append(p,table(b.rows.filter(x=>['OCF','ICF','CFF','CAPEX'].includes(x.code)))); bar(c,[{name:'OCF',data:vals('OCF')},{name:'ICF',data:vals('ICF')},{name:'CFF',data:vals('CFF')},{name:'CAPEX',data:vals('CAPEX')}])}
else if(state.tab==='metrics'){main.append(kpi('매출성장률',r.revGrowth,b.periods[l]?.label,'pct'),kpi('ROA',r.roa,'자산 수익성','pct'),kpi('ROE',r.roe,'자본 수익성','pct'),kpi('이자보상배율',r.interestCoverage,'이자 부담 여력','mul'),kpi('OCF/영업이익',r.ocfToOp,'이익 현금화','mul')); main.lastChild.className='kpis'; const [p,c]=panel('주요 비율 추이'); main.append(p,table(b.metrics.map(m=>({section:m.section,name:m.name,values:m.values})),periods(),'auto')); line(c,[{name:'영업이익률',data:idxs().map(i=>b.ratios[i]?.opMargin)},{name:'ROA',data:idxs().map(i=>b.ratios[i]?.roa)},{name:'ROE',data:idxs().map(i=>b.ratios[i]?.roe)},{name:'OCF/매출',data:idxs().map(i=>b.ratios[i]?.ocfToRev)}])}
else renderBuilder(main)}
function loadLayout(){const key='fd:'+state.book.fingerprint; try{return JSON.parse(localStorage.getItem(key))||defaultLayout()}catch{return defaultLayout()}}
function saveLayout(){localStorage.setItem('fd:'+state.book.fingerprint,JSON.stringify(state.layout))}
function defaultLayout(){return{years:periods().map(p=>p.year).filter(Boolean),cards:[{id:'kpi',type:'kpi',title:'최신 매출액',metric:'REV',left:['REV'],span:3,h:'Compact',visible:true},{id:'line',type:'line',title:'판관비 주요 항목 추이',left:['SGA_RND','SGA_FEE','SGA_SALARY'],right:'REV',span:8,h:'Tall',visible:true},{id:'bar',type:'bar',title:'현금흐름과 CAPEX',left:['OCF','CAPEX'],span:6,h:'Tall',visible:true},{id:'table',type:'table',title:'선택 계정 테이블',left:['REV','COGS','SGA','OP','CAPEX'],span:12,h:'Deep',visible:true}]}}
function activePeriods(){const ys=new Set(state.layout.years); return periods().filter(p=>!p.year||ys.has(p.year))}
function renderBuilder(main){saveLayout(); const wrap=el('div',null,'builder'), side=el('aside',null,'side'), grid=el('section',null,'builder-grid'); side.append(el('h3','카드 빌더'),el('p','카드 너비는 2/3/4/6/8/12 단계로 조절하고, 그리드는 자동으로 열을 맞춥니다.','muted')); const add=btn('카드 추가','btn primary'); add.onclick=()=>{state.layout.cards.push({id:'c'+Date.now(),type:'line',title:'새 카드',metric:'REV',left:['REV'],span:6,h:'Tall',visible:true});render()}; const reset=btn('기본 레이아웃'); reset.onclick=()=>{state.layout=defaultLayout();render()}; side.append(add,reset,el('h4','기간 필터')); const checks=el('div',null,'check-list'); periods().forEach(p=>{if(!p.year)return; const lab=el('label'), inp=el('input'); inp.type='checkbox'; inp.checked=state.layout.years.includes(p.year); inp.onchange=()=>{state.layout.years=inp.checked?[...new Set([...state.layout.years,p.year])]:state.layout.years.filter(y=>y!==p.year); if(!state.layout.years.length)state.layout.years=[p.year]; render()}; lab.append(inp,document.createTextNode(p.label)); checks.append(lab)}); side.append(checks); state.layout.cards.filter(c=>c.visible).forEach(c=>grid.append(cardEl(c))); wrap.append(side,grid); main.append(wrap)}
function cardEl(c){const a=el('article',null,'card'); a.style.gridColumn=`span ${c.span}`; a.style.minHeight=(heightPresets[c.h]||380)+'px'; const h=el('header'), meta=el('div'); meta.append(el('div',`${c.type.toUpperCase()} · ${c.span}/12 · ${c.h}`,'small'),el('h3',c.title)); const act=el('div',null,'actions'), size=btn('크기','icon'), edit=btn('설정','icon'), hide=btn('숨김','icon'), del=btn('삭제','icon'); size.onclick=()=>modal(c,true); edit.onclick=()=>modal(c,false); hide.onclick=()=>{c.visible=false;render()}; del.onclick=()=>{state.layout.cards=state.layout.cards.filter(x=>x.id!==c.id);render()}; act.append(size,edit,hide,del); h.append(meta,act); const body=el('div'); drawCard(c,body); a.append(h,body); return a}
function drawCard(c,body){const ps=activePeriods(); const ix=idxs(ps); const rows=(c.left?.length?c.left:[c.metric]).map(code=>row(code)).filter(Boolean); if(c.type==='kpi'){let r=row(c.metric||c.left?.[0]), last=ix.at(-1), first=ix[0], v=r?.values?.[last], g=div(sub(v,r?.values?.[first]),Math.abs(r?.values?.[first]??0)); body.innerHTML=`<strong style="font-size:32px">${won(v)}</strong><p class="muted">${ps.at(-1)?.label||''} ${r?.name||''}</p><p class="muted">${pct(g)} · 선택기간 첫 기간 대비</p>`; return} if(c.type==='table'){body.append(table(rows,ps)); return} const ch=el('div',null,'chart'); ch.style.height=Math.max(160,(heightPresets[c.h]||380)-118)+'px'; body.append(ch); const series=rows.map(r=>({name:r.name,data:ix.map(i=>r.values[i])})); c.type==='bar'?bar(ch,series,ps):line(ch,series,ps)}
function modal(c,sizeOnly){let bg=el('div',null,'modal-bg open'), m=el('section',null,'modal'), form=el('div',null,'form'); const title=input('제목',c.title), type=select('카드 유형',[['kpi','KPI'],['line','Line'],['bar','Bar'],['table','Table']],c.type), metric=select('KPI 계정',opts(),c.metric), left=select('표시 계정',opts(),c.left,true); form.append(title.label,type.label,metric.label,left.label); if(!sizeOnly)m.append(el('h3','카드 설정'),form); else m.append(el('h3','카드 크기')); m.append(el('div','너비','small'),seg(widthPresets,c.span,v=>{c.span=v;render();modal(c,true)}),el('div','높이','small'),seg(Object.keys(heightPresets),c.h,v=>{c.h=v;render();modal(c,true)})); const rec=el('div',null,'segs'); [['균형 배치',c.type==='kpi'?3:6,c.type==='kpi'?'Compact':'Tall'],['선택 카드 강조',c.type==='table'?12:8,c.type==='kpi'?'Standard':'Tall'],['보고서형 전체폭',12,c.type==='table'?'Deep':'Tall']].forEach(([t,s,h])=>{let b=btn(t,'btn'); b.onclick=()=>{c.span=s;c.h=h;render();modal(c,true)}; rec.append(b)}); m.append(el('div','추천','small'),rec); const actions=el('div',null,'modal-actions'), cancel=btn('취소'), save=btn('저장','btn primary'); cancel.onclick=()=>bg.remove(); save.onclick=()=>{c.title=title.input.value.trim()||'Untitled'; c.type=type.input.value; c.metric=metric.input.value; c.left=[...left.input.selectedOptions].map(o=>o.value); bg.remove(); render()}; actions.append(cancel,save); m.append(actions); bg.append(m); bg.onclick=e=>{if(e.target===bg)bg.remove()}; document.body.append(bg)}
function input(label,value){const l=el('label',label), i=el('input'); i.className='input'; i.value=value||''; l.append(i); return{label:l,input:i}}
function select(label,options,value,multiple=false){const l=el('label',label), s=el('select'); s.className='input'; s.multiple=multiple; options.forEach(([v,t])=>{let o=el('option',t);o.value=v;if(multiple?(value||[]).includes(v):value===v)o.selected=true;s.append(o)}); l.append(s); return{label:l,input:s}}
function opts(){return state.book.rows.map(r=>[r.code,r.label])}
function seg(values,current,fn){const d=el('div',null,'segs'); values.forEach(v=>{let b=btn(String(v),String(v)===String(current)?'seg active':'seg'); b.onclick=()=>fn(v); d.append(b)}); return d}

upload();
